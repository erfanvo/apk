name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
              
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
              
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
              
      - name: Install Flet
        run: pip install flet
            
      - name: Build APK
        run: flet build apk
            
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: OkalaApp-APK
          path: build/apk/
